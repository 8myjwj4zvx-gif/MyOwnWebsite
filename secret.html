<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤫 Geheimbereich</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo-link" href="index.html" aria-label="Zur Startseite">
      <img class="logo-mark" src="logo.png" alt="">
    </a>
    <div class="header-actions">
      <a class="rad-link" href="touren.html" aria-label="Zu meinen Touren">
        <svg class="rad-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <rect x="4" y="4" width="192" height="192" rx="40" fill="#ffffff" stroke="#e5e5e7" stroke-width="4"/>
          <path d="M35 130 L65 130 L85 105 L105 138 L128 95 L152 138 L172 118" fill="none" stroke="#fc4c02" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="128" cy="95" r="10" fill="#fc4c02"/>
        </svg>
      </a>
      <button class="hamburger" id="menuToggle" aria-label="Menü öffnen" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="menu" id="menu">
      <a href="index.html">Home</a>
      <a href="touren.html">Meine Touren</a>
      <a href="secret.html">Secret Content</a>
    </nav>
  </header>

  <div class="wrap">
    <h1>🤫 Geheimbereich</h1>
    <p class="tagline">Dieser Bereich ist "passwortgeschützt".</p>

    <div class="secret-box" id="gate">
      <p>🔒 Passwort eingeben:</p>
      <input type="password" id="pwInput" placeholder="Passwort" />
      <button id="unlockBtn">Entsperren</button>
      <div class="pw-error" id="pwError">Falsches Passwort.</div>
    </div>

    <div class="secret-box" id="content" style="display:none;">
      <p>Glückwunsch – du hast den geheimen Bereich gefunden. Klick den Button für ein streng geheimes Geheimnis:</p>
      <button id="revealBtn">Verrate mir ein Geheimnis</button>
      <div id="factOutput"></div>
    </div>

    <footer>&copy; 2026 Daniel Überreiter</footer>
  </div>

  <script src="nav.js"></script>
  <script>
    var PASSWORD = "Daniel122";
    var gate = document.getElementById('gate');
    var content = document.getElementById('content');
    var pwInput = document.getElementById('pwInput');
    var pwError = document.getElementById('pwError');

    function unlock() {
      gate.style.display = 'none';
      content.style.display = 'block';
      sessionStorage.setItem('secretUnlocked', '1');
    }

    function tryUnlock() {
      if (pwInput.value === PASSWORD) {
        unlock();
      } else {
        pwError.style.display = 'block';
      }
    }

    document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
    pwInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') tryUnlock();
    });

    if (sessionStorage.getItem('secretUnlocked') === '1') {
      unlock();
    }

    var facts = [
      "Geheimnis #1: Diese Seite existiert nur, weil ich testen wollte, ob ich ein Geheimnis bauen kann.",
      "Geheimnis #2: Mein größter Gegner beim Radfahren ist Gegenwind, nicht die Steigung.",
      "Geheimnis #3: Diese ganze Website hat 0 Euro gekostet – GitHub Pages sei Dank.",
      "Geheimnis #4: Mein VO2max steigt schneller als meine Geduld beim Warten auf DNS-Propagation.",
      "Geheimnis #5: Du gehörst jetzt offiziell zum exklusiven Klub der Leute, die auf „Secret Content\" geklickt haben.",
      "Geheimnis #6: Es gibt kein Geheimnis #7."
    ];
    var last = -1;
    document.getElementById('revealBtn').addEventListener('click', function () {
      var i;
      do { i = Math.floor(Math.random() * facts.length); } while (i === last && facts.length > 1);
      last = i;
      document.getElementById('factOutput').textContent = facts[i];
    });
  </script>
</body>
</html>
